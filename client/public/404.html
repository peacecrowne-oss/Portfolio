<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Peace Makinde</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #0f172a;
        --muted: #475569;
        --border: #e2e8f0;
        --accent-bg: #0f172a;
        --accent-fg: #ffffff;
        --accent-hover: #334155;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --fg: #ffffff;
          --muted: #94a3b8;
          --border: #1e293b;
          --accent-bg: #ffffff;
          --accent-fg: #0f172a;
          --accent-hover: #e2e8f0;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        text-align: center;
      }

      main {
        max-width: 32rem;
      }

      .code {
        font-size: 4rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 0.5rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 0 0 0.75rem;
      }

      p {
        font-size: 1rem;
        line-height: 1.6;
        color: var(--muted);
        margin: 0 0 2rem;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.375rem;
        padding: 0.625rem 1.5rem;
        font-size: 0.875rem;
        font-weight: 600;
        text-decoration: none;
        background: var(--accent-bg);
        color: var(--accent-fg);
        border: 1px solid var(--border);
        transition: background-color 0.15s ease;
      }

      .button:hover {
        background: var(--accent-hover);
      }

      .button:focus-visible {
        outline: 2px solid var(--fg);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="code" aria-hidden="true">404</p>
      <h1>Page Not Found</h1>
      <p>
        The page you're looking for doesn't exist or may have been moved.
        Let's get you back on track.
      </p>
      <a class="button" href="./">Return Home</a>
    </main>
  </body>
</html>
