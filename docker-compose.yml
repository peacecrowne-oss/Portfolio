volumes:
  client_build:

networks:
  default:
    name: portfolio-network

services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    volumes:
      - client_build:/shared-build

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - PORT=5000
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost
    expose:
      - "5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    volumes:
      - client_build:/usr/share/nginx/html:ro
    depends_on:
      client:
        condition: service_completed_successfully
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
