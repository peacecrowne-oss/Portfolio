<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peace Makinde | Portfolio</title>
    <meta name="robots" content="noindex" />
    <script>
      // GitHub Pages serves this static file for any path it doesn't
      // recognize (e.g. a direct link or refresh on a client-side route
      // like /projects/leadforge-ai-system). There's no server-side
      // rewrite available on GH Pages, so this encodes the requested
      // path into the query string and redirects to index.html, which
      // decodes it back (see the inline script in index.html) before the
      // router mounts and renders the real route.
      //
      // Other deploy targets (Vercel, the Docker/nginx image) handle SPA
      // routing via a normal server-side rewrite and never serve this
      // file, so this only runs on GitHub Pages.
      //
      // Standard, well-tested pattern: https://github.com/rafgraph/spa-github-pages
      (function (l) {
        // number of path segments to keep for a GH Pages *project* site
        // (the repo name segment, e.g. /Portfolio/) before the app route
        var pathSegmentsToKeep = 1;

        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
            "/?/" +
            l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash,
        );
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
